# Lerim default configuration — shipped with the package.
# Override in ~/.lerim/config.toml (user)
# API keys come from environment variables only in ~/.lerim/.env

[data]
dir = "~/.lerim"

[server]
host = "127.0.0.1"
port = 8765
sync_interval_minutes = 30          # sync hot path interval
maintain_interval_minutes = 60       # maintain cold path interval
sync_window_days = 7
sync_max_sessions = 50

[roles.agent]
provider = "minimax"               # opencode_go | minimax | zai | openrouter | openai | ollama
model = "MiniMax-M2.5"                 # OpenCode Go models: minimax-m2.7, minimax-m2.5, kimi-k2.5, glm-5
api_base = ""
# Model names are auto-normalized per provider (e.g. minimax-m2.5 → MiniMax-M2.5 for minimax provider).
fallback_models = ["zai:glm-4.7"]  # auto-switch on quota/rate-limit errors
# PydanticAI three-pass sync usage limits (per-pass request_limit).
# Sizing rationale: read("trace") is capped at 50KB per chunk (see
# lerim.agents.tools.TRACE_MAX_CHUNK_BYTES). A 1MB trace needs ~20 chunks
# end-to-end plus ~5 overhead calls (read index, grep remember, final
# output) = 25 for reflect/extract. Finalize has HARD RULES that forbid
# trace reads so it only needs verify_index + optional edit + write
# summary = 15 with reasoning overhead. Single source of truth — these
# values flow to `lerim.agents.extract.run_extraction_three_pass` via
# `Config.agent_role` in runtime.py and the eval harness.
usage_limit_reflect = 30               # Pass 1 (reflect) max tool calls
usage_limit_extract = 30               # Pass 2 (extract) max tool calls
usage_limit_finalize = 30               # Pass 3 (finalize) max tool calls
max_iters_maintain = 50                # max ReAct iterations for agent role in maintain flow
max_iters_ask = 20                     # max ReAct iterations for agent role in ask flow
openrouter_provider_order = []
thinking = true
temperature = 0.1
max_tokens = 32000

[providers]
# Default API base URLs per provider.
# Override here to point all roles using that provider at a different endpoint.
# Per-role api_base (under [roles.*]) takes precedence over these defaults.
minimax = "https://api.minimax.io/v1"
zai = "https://api.z.ai/api/coding/paas/v4"
openai = "https://api.openai.com/v1"
openrouter = "https://openrouter.ai/api/v1"
opencode_go = "https://opencode.ai/zen/go/v1"
ollama = "http://127.0.0.1:11434"
# Docker: use "http://host.docker.internal:11434" if Ollama runs on the host.
mlx = "http://127.0.0.1:8000/v1"
auto_unload = true                     # unload Ollama models after each sync/maintain cycle to free RAM

[cloud]
endpoint = "https://api.lerim.dev"
# token is set via `lerim auth` or LERIM_CLOUD_TOKEN env var

[agents]
# Map agent names to session directory paths.
# claude = "~/.claude/projects"
# codex = "~/.codex/sessions"
# cursor = "~/Library/Application Support/Cursor/User/globalStorage"
# opencode = "~/.local/share/opencode"

[projects]
# Map project short names to absolute host paths.
# my-project = "~/codes/my-project"
