# Test-only config for smoke / integration / e2e tests.
# Mirrors production default.toml roles with global_only scope.
#
# Override via env vars:
#   LERIM_TEST_PROVIDER  — provider for all roles
#   LERIM_TEST_MODEL     — model for all roles

[memory]
scope = "global_only"

[roles.agent]
provider = "minimax"
model = "MiniMax-M2.5"
fallback_models = ["zai:glm-4.7"]
timeout_seconds = 300
max_iterations = 10
max_iters_sync = 15
max_iters_maintain = 30
max_iters_ask = 30
thinking = true
max_tokens = 32000
